ingredients=Felce,Mandragora,Artiglio,Fiore,Fungo,Rospo,Piuma,Scorpione

# Proprietà fisse delle 8 formule alchemiche del gioco da tavolo.
# Ogni formula è composta da 3 atomi (Rosso, Verde, Blu), ognuno con una dimensione e un segno.
# All'inizio della partita, la Factory mescolerà queste formule e le assegnerà in segreto agli ingredienti.
