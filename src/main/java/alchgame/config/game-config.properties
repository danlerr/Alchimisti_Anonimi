# ------------------------------------------------------------------------------
# 5. FLUSSO DEL TEMPO E REGOLE APPLICATIVE (Dependency Injection)
# ------------------------------------------------------------------------------
# Questi valori vengono iniettati dal Bootstrapper direttamente nei Controller.

# Cubi a disposizione per la fase di dichiarazione e numero totale di round per partita.
startingActionCubes=3
totalRounds=2

# Regole di resa delle azioni (Action Yields)
# Monete d'oro ottenute scartando un ingrediente tramite Trasmutazione (TransmuteController)
rules.transmute.gold=1
# Carte pescate dal mazzo tramite l'azione Raccogliere nel Bosco (ForageController)
rules.forage.yield=1
#costo di una azione in cubi azione 1 cubo azione = 1 azione.  
rules.action_cube_cost=1